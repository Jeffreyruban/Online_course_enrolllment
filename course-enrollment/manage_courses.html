<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Courses - Course Hub</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: 'Segoe UI', Tahoma, Geneva; background: #f5f7fa; color: #333;}
        .navbar {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;}
        .navbar-brand {font-size: 20px; font-weight: 700;}
        .navbar-menu {display: flex; gap: 20px; align-items: center;}
        .navbar-menu a {color: white; text-decoration: none; font-size: 14px; padding: 8px 12px; border-radius: 6px; cursor: pointer;}
        .btn-logout {background: rgba(255, 255, 255, 0.2); padding: 8px 16px; border-radius: 6px; border: 1px solid white; cursor: pointer; color: white;}
        .container {max-width: 1200px; margin: 0 auto; padding: 40px 20px;}
        .page-header {background: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); display: flex; justify-content: space-between; align-items: center;}
        .header-content h1 {font-size: 28px; color: #667eea; margin-bottom: 10px;}
        .header-content p {color: #666; font-size: 16px;}
        .btn-primary {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;}
        .section {background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);}
        .section-title {font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #333;}
        .table {width: 100%; border-collapse: collapse;}
        .table th {padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #e0e0e0; background: #f5f7fa;}
        .table td {padding: 15px; border-bottom: 1px solid #f0f0f0;}
        .btn-action {padding: 8px 16px; margin-right: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;}
        .btn-edit {background: #4caf50; color: white;}
        .btn-delete {background: #f44336; color: white;}
        .modal {display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5);}
        .modal.show {display: flex; justify-content: center; align-items: center;}
        .modal-content {background-color: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);}
        .modal-header {font-size: 22px; font-weight: 700; margin-bottom: 20px; color: #333; display: flex; justify-content: space-between;}
        .close {font-size: 28px; font-weight: bold; cursor: pointer; color: #999;}
        .form-group {margin-bottom: 15px;}
        .form-group label {display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 14px;}
        .form-group input, .form-group textarea {width: 100%; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit;}
        .modal-footer {display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f0f0f0;}
        .btn-cancel {background: #f0f0f0; color: #333; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;}
        .loading {text-align: center; padding: 40px;}
        .spinner {display: inline-block; width: 30px; height: 30px; border: 4px solid #f0f0f0; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite;}
        @keyframes spin {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}}
        @media (max-width: 768px) {
            .navbar {flex-direction: column; gap: 15px;}
            .page-header {flex-direction: column; gap: 15px; align-items: flex-start;}
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📚 Course Hub</div>
        <div class="navbar-menu">
            <a onclick="navigate('admin_dashboard.html')">Dashboard</a>
            <a onclick="navigate('manage_enrollments.html')">Manage Enrollments</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="header-content">
                <h1>📚 Manage Courses</h1>
                <p>Add, edit, and delete courses</p>
            </div>
            <button class="btn-primary" onclick="openAddModal()">+ Add Course</button>
        </div>

        <div class="section">
            <h2 class="section-title">All Courses</h2>
            <div id="coursesContainer">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <div id="courseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle">Add Course</span>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="courseForm" onsubmit="saveCourse(event)">
                <input type="hidden" id="courseId">
                <div class="form-group">
                    <label for="courseName">Course Name</label>
                    <input type="text" id="courseName" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" required></textarea>
                </div>
                <div class="form-group">
                    <label for="duration">Duration (Weeks)</label>
                    <input type="number" id="duration" min="1" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Course</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let courses = [];
        function navigate(page) {window.location.href = page;}
        function checkSession() {
            fetch('backend/check_session.php').then(r => r.json()).then(data => {
                if (!data.logged_in || data.role !== 'Admin') window.location.href = 'login.html';
                else loadCourses();
            });
        }
        function loadCourses() {
            fetch('backend/get_all_courses.php').then(r => r.json()).then(data => {
                if (data.success) {
                    courses = data.courses;
                    displayCourses(data.courses);
                }
            });
        }
        function displayCourses(items) {
            if (items.length === 0) {
                document.getElementById('coursesContainer').innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">No courses found.</p>';
                return;
            }
            let html = '<table class="table"><thead><tr><th>Course Name</th><th>Instructor</th><th>Duration</th><th>Actions</th></tr></thead><tbody>';
            items.forEach(c => {
                html += '<tr><td>' + c.course_name + '</td><td>' + c.instructor + '</td><td>' + (c.duration_weeks || '-') + ' weeks</td>';
                html += '<td><button class="btn-action btn-edit" onclick="editCourse(' + c.id + ')">Edit</button>';
                html += '<button class="btn-action btn-delete" onclick="deleteCourse(' + c.id + ')">Delete</button></td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('coursesContainer').innerHTML = html;
        }
        function openAddModal() {
            document.getElementById('courseId').value = '';
            document.getElementById('courseForm').reset();
            document.getElementById('modalTitle').textContent = 'Add Course';
            document.getElementById('courseModal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('courseModal').classList.remove('show');
        }
        function editCourse(id) {
            const course = courses.find(c => c.id === id);
            if (course) {
                document.getElementById('courseId').value = course.id;
                document.getElementById('courseName').value = course.course_name;
                document.getElementById('description').value = course.description || '';
                document.getElementById('duration').value = course.duration_weeks || '';
                document.getElementById('modalTitle').textContent = 'Edit Course';
                document.getElementById('courseModal').classList.add('show');
            }
        }
        function saveCourse(e) {
            e.preventDefault();
            fetch('backend/manage_course.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    method: document.getElementById('courseId').value ? 'update' : 'add',
                    course_id: document.getElementById('courseId').value,
                    course_name: document.getElementById('courseName').value,
                    description: document.getElementById('description').value,
                    duration_weeks: document.getElementById('duration').value
                })
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    closeModal();
                    loadCourses();
                }
            });
        }
        function deleteCourse(id) {
            if (confirm('Delete this course?')) {
                fetch('backend/manage_course.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({method: 'delete', course_id: id})
                }).then(r => r.json()).then(data => {
                    if (data.success) loadCourses();
                });
            }
        }
        function logout() {
            if (confirm('Logout?')) fetch('backend/logout.php').then(() => window.location.href = 'login.html');
        }
        window.onclick = function(e) {
            if (e.target === document.getElementById('courseModal')) closeModal();
        }
        checkSession();
    </script>
</body>
</html>
