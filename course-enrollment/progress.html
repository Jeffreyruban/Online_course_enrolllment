<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progress - Course Hub</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: 'Segoe UI', Tahoma, Geneva; background: #f5f7fa; color: #333;}
        .navbar {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;}
        .navbar-menu {display: flex; gap: 20px; align-items: center;}
        .navbar-menu a {color: white; text-decoration: none; font-size: 14px; padding: 8px 12px; border-radius: 6px; cursor: pointer;}
        .navbar-menu a:hover {background: rgba(255, 255, 255, 0.2);}
        .btn-logout {background: rgba(255, 255, 255, 0.2); padding: 8px 16px; border-radius: 6px; border: 1px solid white; cursor: pointer; color: white;}
        .container {max-width: 1200px; margin: 0 auto; padding: 40px 20px;}
        .section {background: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);}
        .section-title {font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #333;}
        .table {width: 100%; border-collapse: collapse;}
        .table th {padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #e0e0e0; background: #f5f7fa;}
        .table td {padding: 15px; border-bottom: 1px solid #f0f0f0;}
        .status-badge {padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;}
        .status-completed {background: #e8f5e9; color: #2e7d32;}
        .status-in-progress {background: #e3f2fd; color: #1565c0;}
        .status-pending {background: #fff3e0; color: #e65100;}
        .loading {text-align: center; padding: 40px;}
        .spinner {display: inline-block; width: 30px; height: 30px; border: 4px solid #f0f0f0; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite;}
        @keyframes spin {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📚 Course Hub</div>
        <div class="navbar-menu">
            <a onclick="navigate('student_dashboard.html')">Dashboard</a>
            <a onclick="navigate('courses.html')">Browse Courses</a>
            <a onclick="navigate('reports.html')">Reports</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="section">
            <h2 class="section-title">📊 My Progress</h2>
            <div id="progressContainer"><div class="loading"><div class="spinner"></div></div></div>
        </div>
    </div>

    <script>
        function navigate(page) {window.location.href = page;}
        function checkSession() {
            fetch('backend/check_session.php').then(r => r.json()).then(data => {
                if (!data.logged_in) window.location.href = 'login.html';
                else loadProgress();
            });
        }
        function loadProgress() {
            fetch('backend/get_progress.php').then(r => r.json()).then(data => {
                if (data.success) displayProgress(data.progress);
            });
        }
        function displayProgress(progress) {
            if (progress.length === 0) {
                document.getElementById('progressContainer').innerHTML = '<p>No progress data.</p>';
                return;
            }
            let grouped = {}, html = '';
            progress.forEach(p => {
                if (!grouped[p.course_name]) grouped[p.course_name] = [];
                grouped[p.course_name].push(p);
            });
            Object.keys(grouped).forEach(course => {
                html += '<h3>' + course + '</h3>';
                html += '<table class="table"><thead><tr><th>Module</th><th>Status</th><th>Score</th></tr></thead><tbody>';
                grouped[course].forEach(m => {
                    let statusClass = 'status-' + (m.status || 'pending').toLowerCase().replace(' ', '-');
                    html += '<tr><td>' + m.module_name + '</td><td><span class="status-badge ' + statusClass + '">' + (m.status || 'Pending') + '</span></td><td>' + (m.score || '-') + '</td></tr>';
                });
                html += '</tbody></table>';
            });
            document.getElementById('progressContainer').innerHTML = html;
        }
        function logout() {
            if (confirm('Logout?')) fetch('backend/logout.php').then(() => window.location.href = 'login.html');
        }
        checkSession();
    </script>
</body>
</html>
