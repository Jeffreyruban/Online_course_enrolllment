<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Enrollments - Course Hub</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: 'Segoe UI', Tahoma, Geneva; background: #f5f7fa; color: #333;}
        .navbar {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;}
        .navbar-brand {font-size: 20px; font-weight: 700;}
        .navbar-menu {display: flex; gap: 20px; align-items: center;}
        .navbar-menu a {color: white; text-decoration: none; font-size: 14px; padding: 8px 12px; border-radius: 6px; cursor: pointer;}
        .btn-logout {background: rgba(255, 255, 255, 0.2); padding: 8px 16px; border-radius: 6px; border: 1px solid white; cursor: pointer; color: white;}
        .container {max-width: 1200px; margin: 0 auto; padding: 40px 20px;}
        .page-header {background: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);}
        .page-header h1 {font-size: 28px; color: #667eea; margin-bottom: 10px;}
        .page-header p {color: #666; font-size: 16px;}
        .section {background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);}
        .section-title {font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #333;}
        .table {width: 100%; border-collapse: collapse;}
        .table th {padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #e0e0e0; background: #f5f7fa;}
        .table td {padding: 15px; border-bottom: 1px solid #f0f0f0;}
        .status-badge {padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;}
        .status-active {background: #e3f2fd; color: #1565c0;}
        .status-completed {background: #e8f5e9; color: #2e7d32;}
        .status-dropped {background: #ffebee; color: #c62828;}
        .btn-action {padding: 8px 16px; margin-right: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;}
        .btn-update {background: #4caf50; color: white;}
        .btn-delete {background: #f44336; color: white;}
        .loading {text-align: center; padding: 40px;}
        .spinner {display: inline-block; width: 30px; height: 30px; border: 4px solid #f0f0f0; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite;}
        @keyframes spin {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}}
        @media (max-width: 768px) {
            .navbar {flex-direction: column; gap: 15px;}
            .table {font-size: 14px;}
            .table th, .table td {padding: 10px;}
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📚 Course Hub</div>
        <div class="navbar-menu">
            <a onclick="navigate('admin_dashboard.html')">Dashboard</a>
            <a onclick="navigate('manage_courses.html')">Manage Courses</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>👥 Manage Enrollments</h1>
            <p>View and manage student enrollments</p>
        </div>

        <div class="section">
            <h2 class="section-title">All Enrollments</h2>
            <div id="enrollmentsContainer">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <script>
        let enrollments = [];
        function navigate(page) {window.location.href = page;}
        function checkSession() {
            fetch('backend/check_session.php').then(r => r.json()).then(data => {
                if (!data.logged_in || data.role !== 'Admin') window.location.href = 'login.html';
                else loadEnrollments();
            });
        }
        function loadEnrollments() {
            fetch('backend/get_all_enrollments.php').then(r => r.json()).then(data => {
                if (data.success) {
                    enrollments = data.enrollments;
                    displayEnrollments(data.enrollments);
                }
            });
        }
        function displayEnrollments(items) {
            if (items.length === 0) {
                document.getElementById('enrollmentsContainer').innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">No enrollments found.</p>';
                return;
            }
            let html = '<table class="table"><thead><tr><th>Student Name</th><th>Course Name</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
            items.forEach(e => {
                const statusClass = 'status-' + (e.status || 'active').toLowerCase();
                html += '<tr><td>' + e.student_name + '</td><td>' + e.course_name + '</td><td>' + e.date_enrolled + '</td>';
                html += '<td><span class="status-badge ' + statusClass + '">' + e.status + '</span></td>';
                html += '<td><button class="btn-action btn-update" onclick="updateStatus(' + e.enrollment_id + ', \'' + e.status + '\')">Update</button>';
                html += '<button class="btn-action btn-delete" onclick="deleteEnrollment(' + e.enrollment_id + ')">Delete</button></td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('enrollmentsContainer').innerHTML = html;
        }
        function updateStatus(enrollmentId, currentStatus) {
            const newStatus = prompt('Current: ' + currentStatus + '\n\nEnter new status:\nActive\nCompleted\nDropped', currentStatus);
            if (newStatus && ['Active', 'Completed', 'Dropped'].includes(newStatus) && newStatus !== currentStatus) {
                fetch('backend/manage_enrollment.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({method: 'update', enrollment_id: enrollmentId, status: newStatus})
                }).then(r => r.json()).then(data => {
                    if (data.success) loadEnrollments();
                });
            }
        }
        function deleteEnrollment(enrollmentId) {
            if (confirm('Delete this enrollment?')) {
                fetch('backend/manage_enrollment.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({method: 'delete', enrollment_id: enrollmentId})
                }).then(r => r.json()).then(data => {
                    if (data.success) loadEnrollments();
                });
            }
        }
        function logout() {
            if (confirm('Logout?')) fetch('backend/logout.php').then(() => window.location.href = 'login.html');
        }
        checkSession();
    </script>
</body>
</html>
